name: E2E BDD

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite tag
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression
          - custom
      browser_project:
        description: Playwright project
        required: true
        default: desktop-and-mobile
        type: choice
        options:
          - desktop-chromium
          - mobile-chrome
          - desktop-firefox
          - desktop-and-mobile
          - all-browsers
      custom_tag:
        description: Optional tag for custom runs, for example @cart or @checkout
        required: false
        type: string
      base_url:
        description: Optional base URL override
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 10
    env:
      BASE_URL: ${{ inputs.base_url || vars.BASE_URL || 'https://automationteststore.com' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  e2e:
    name: ${{ github.event_name == 'schedule' && 'regression' || inputs.suite || 'smoke' }} on ${{ matrix.browser_project }}
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser_project: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.browser_project == 'desktop-chromium' && '["desktop-chromium"]' || github.event_name == 'workflow_dispatch' && inputs.browser_project == 'mobile-chrome' && '["mobile-chrome"]' || github.event_name == 'workflow_dispatch' && inputs.browser_project == 'desktop-firefox' && '["desktop-firefox"]' || github.event_name == 'workflow_dispatch' && inputs.browser_project == 'all-browsers' && '["desktop-chromium","mobile-chrome","desktop-firefox"]' || '["desktop-chromium","mobile-chrome"]') }}
    env:
      BASE_URL: ${{ inputs.base_url || vars.BASE_URL || 'https://automationteststore.com' }}
      CI_RETRIES: 1
      TEST_SUITE: ${{ github.event_name == 'schedule' && 'regression' || inputs.suite || 'smoke' }}
      PLAYWRIGHT_PROJECT: ${{ matrix.browser_project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate BDD tests
        run: npm run bddgen

      - name: Validate custom tag
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'custom' && inputs.custom_tag == ''
        run: |
          echo "custom_tag is required when suite is custom"
          exit 1

      - name: Resolve test tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "TEST_GREP=@regression" >> "$GITHUB_ENV"
          elif [ "${{ inputs.suite || 'smoke' }}" = "custom" ]; then
            echo "TEST_GREP=${{ inputs.custom_tag }}" >> "$GITHUB_ENV"
          else
            echo "TEST_GREP=@${{ inputs.suite || 'smoke' }}" >> "$GITHUB_ENV"
          fi

      - name: Run selected suite
        run: npx playwright test --project=$PLAYWRIGHT_PROJECT --grep "$TEST_GREP"

      - name: Generate Allure report
        if: always()
        run: npm run report:allure:generate
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser_project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser_project }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser_project }}
          path: allure-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser_project }}
          path: allure-results/
          retention-days: 14
          if-no-files-found: ignore

  publish-allure-pages:
    name: Publish Allure report to GitHub Pages
    needs: e2e
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'regression'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Restore Allure history
        run: |
          mkdir -p allure-results/history
          history_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/history"
          for file in history-trend.json duration-trend.json retries-trend.json categories-trend.json; do
            curl --fail --silent --show-error --location "$history_url/$file" --output "allure-results/history/$file" || true
          done

      - name: Generate combined Allure report
        run: npm run report:allure:generate

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
