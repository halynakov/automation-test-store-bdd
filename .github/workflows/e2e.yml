name: E2E BDD

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite tag
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression
      browser_project:
        description: Playwright project
        required: true
        default: desktop-chromium
        type: choice
        options:
          - desktop-chromium
          - desktop-firefox
          - mobile-chrome
      base_url:
        description: Optional base URL override
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 10
    env:
      BASE_URL: ${{ inputs.base_url || vars.BASE_URL || 'https://automationteststore.com' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  e2e:
    name: ${{ github.event_name == 'schedule' && 'regression' || inputs.suite || 'smoke' }} on ${{ matrix.browser_project }}
    needs: quality
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser_project:
          - desktop-chromium
          - desktop-firefox
          - mobile-chrome
    env:
      BASE_URL: ${{ inputs.base_url || vars.BASE_URL || 'https://automationteststore.com' }}
      CI_RETRIES: 1
      TEST_SUITE: ${{ github.event_name == 'schedule' && 'regression' || inputs.suite || 'smoke' }}
      PLAYWRIGHT_PROJECT: ${{ matrix.browser_project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate BDD tests
        run: npm run bddgen

      - name: Run selected suite
        if: (github.event_name == 'workflow_dispatch' && matrix.browser_project == inputs.browser_project) || (github.event_name != 'workflow_dispatch' && matrix.browser_project != 'desktop-firefox')
        run: npx playwright test --project=$PLAYWRIGHT_PROJECT --grep @$TEST_SUITE

      - name: Generate Allure report
        if: always()
        run: npm run report:allure:generate
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser_project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser_project }}
          path: test-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser_project }}
          path: allure-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser_project }}
          path: allure-results/
          retention-days: 14
          if-no-files-found: ignore

  publish-allure-pages:
    name: Publish Allure report to GitHub Pages
    needs: e2e
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Generate combined Allure report
        run: npm run report:allure:generate

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
